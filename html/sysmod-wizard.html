<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSMOD Wizard - Create New Model</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#4f46e5', // Indigo 600
                            teal: '#06b6d4', // Cyan 500
                            dark: '#0f172a', // Slate 900
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(6, 182, 212, 0.3)',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary-color: #4f46e5;
            --background-color: #f3f4f6;
            --surface-color: #ffffff;
            --text-color: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #d1d5db;
            --font-family: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Nav */
        nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            height: 64px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 50;
        }

        /* Main Layout */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar Wizard Steps */
        .sidebar {
            width: 300px;
            background-color: var(--surface-color);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .step-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .step-item:hover {
            background-color: #f9fafb;
            color: var(--text-color);
        }

        .step-item.active {
            background-color: #eef2ff;
            color: var(--primary-color);
            font-weight: 600;
        }

        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #e5e7eb;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            margin-right: 12px;
            font-weight: 600;
        }

        .step-item.active .step-number {
            background-color: var(--primary-color);
            color: white;
        }

        .step-item.completed .step-number {
            background-color: #10b981;
            /* Green */
            color: white;
        }

        /* Content Area */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-width: 1600px;
            /* Much wider */
            margin: 0 auto;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 1rem;
        }

        .description {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: var(--font-family);
            transition: border-color 0.15s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
            color: white;
            font-weight: 600;
            padding: 12px 32px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .btn-secondary {
            background-color: #e5e7eb;
            color: var(--text-color);
            font-weight: 600;
            padding: 12px 32px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-right: 1rem;
        }

        .btn-secondary:hover {
            background-color: #d1d5db;
        }

        .placeholder-content {
            padding: 40px;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            color: var(--text-secondary);
            text-align: center;
        }

        pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }

        .code-editor-container {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background-color: #f8fafc;
            min-height: 500px;
            /* Increased height further */
            position: relative;
        }

        .code-editor-content {
            width: 100%;
            height: 100%;
            min-height: 500px;
            padding: 12px;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #334155;
            outline: none;
            overflow: auto;
            /* Both scrollbars if needed */
            white-space: pre;
            /* No wrapping, forces horizontal scroll */
        }

        .sysml-keyword {
            font-weight: bold;
            color: #7c3aed;
            /* Violet */
        }
    </style>
</head>

<body>

    <!-- Top Navigation -->
    <nav>
        <div class="flex items-center space-x-3">
            <div class="bg-gradient-to-tr from-brand-blue to-brand-teal p-2 rounded-lg text-white shadow-glow">
                <i data-lucide="wand-2" class="w-6 h-6"></i>
            </div>
            <span class="font-bold text-xl tracking-tight text-slate-900">SYSMOD<span
                    class="text-brand-blue">Wizard</span></span>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="window.location.href='index.html'"
                class="text-slate-500 hover:text-slate-800 font-medium text-sm transition-colors">
                Cancel & Exit
            </button>
        </div>
    </nav>

    <div class="workspace">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-4">Creation Steps</div>

            <div class="step-item active" onclick="goToStep(1)">
                <div class="step-number">1</div>
                <span>Name of the system</span>
            </div>

            <div class="step-item" onclick="goToStep(2)">
                <div class="step-number">2</div>
                <span>Brownfield Architecture</span>
            </div>

            <div class="step-item" onclick="goToStep(3)">
                <div class="step-number">3</div>
                <span>Problem Statement</span>
            </div>

            <div class="step-item" onclick="goToStep(4)">
                <div class="step-number">4</div>
                <span>Stakeholder Needs</span>
            </div>

            <div class="step-item" onclick="goToStep(5)">
                <div class="step-number">5</div>
                <span>System Idea</span>
            </div>

            <div class="step-item" onclick="goToStep(6)">
                <div class="step-number">6</div>
                <span>System Requirements</span>
            </div>

            <div class="step-item" onclick="goToStep(7)">
                <div class="step-number">7</div>
                <span>Use Cases</span>
            </div>

            <div class="step-item" onclick="goToStep(8)">
                <div class="step-number">8</div>
                <span>Product Architecture</span>
            </div>
        </div>

        <!-- Main Content (Dynamic) -->
        <div class="content" id="step-content">
            <!-- Content will be injected by JS -->
            <div class="text-center mt-20">
                <div
                    class="spinner border-4 border-indigo-200 border-t-indigo-600 rounded-full w-12 h-12 animate-spin mx-auto mb-4">
                </div>
                <h2 class="text-xl font-semibold text-slate-700">Loading Wizard...</h2>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        let currentStep = 1;
        const totalSteps = 8;

        // State variables to hold data between steps
        let wizardData = {
            systemName: '',
            systemDescription: '',
            sysmlCode: ''
        };

        // Step Definitions (Content)
        const steps = {
            1: {
                title: "Name of the system",
                description: "Let's start by giving a name to the system you want to develop. This will form the root of your project.",
                content: `
                    <div id="step1-input-area">
                        <div class="form-group">
                            <label for="system_name">System Name</label>
                            <div class="relative">
                                <input type="text" id="system_name" placeholder="e.g. Forest Fire Observation System" value="\${wizardData.systemName}">
                                <button onclick="copyContent('system_name', this)" class="absolute top-2 right-2 p-1 bg-white rounded-md shadow-sm hover:bg-gray-100 text-gray-500" title="Copy to clipboard">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="system_description">Brief Description</label>
                            <div class="relative">
                                <textarea id="system_description" rows="4" placeholder="What is this system about?">\${wizardData.systemDescription}</textarea>
                                <button onclick="copyContent('system_description', this)" class="absolute top-2 right-2 p-1 bg-white rounded-md shadow-sm hover:bg-gray-100 text-gray-500" title="Copy to clipboard">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mt-4">
                             <button onclick="generateInitialCode()" class="btn-primary">Generate Initial Model <i data-lucide="cpu" class="w-4 h-4 inline ml-1"></i></button>
                        </div>
                    </div>

                    <div id="step1-code-area" style="display: none; margin-top: 2rem; border-top: 1px solid #e5e7eb; padding-top: 2rem;">
                        <h3 class="text-lg font-semibold text-slate-800 mb-2">Initial SysML v2 Code</h3>
                         <div class="form-group">
                            <label for="sysml_code_editor">Review and Edit Code</label>
                            <div class="code-editor-container relative">
                                <div id="sysml_code_editor" class="code-editor-content" contenteditable="true" oninput="handleCodeInput(this)"></div>
                                <button onclick="copyContent('sysml_code_editor', this)" class="absolute top-2 right-2 p-2 bg-slate-800 text-white rounded-md shadow-md hover:bg-slate-700 opacity-80 hover:opacity-100 transition-opacity" title="Copy Code">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `
            },
            2: {
                title: "Brownfield Architecture",
                description: "Identify existing systems, environments, or constraints that your new system must integrate with or replace. You can describe them below or upload relevant documents (PDF, Docx, etc.).",
                content: `
                    <div id="step2-content">
                        <div class="form-group">
                        <div class="form-group">
                            <label for="brownfield_text">Brownfield Description</label>
                            <div class="relative">
                                <textarea id="brownfield_text" rows="6" placeholder="Describe the existing system context, interfaces, and constraints...">\${wizardData.brownfieldText || ''}</textarea>
                                <button onclick="copyContent('brownfield_text', this)" class="absolute top-2 right-2 p-1 bg-white rounded-md shadow-sm hover:bg-gray-100 text-gray-500" title="Copy to clipboard">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div id="existing-files-container-step2" class="form-group hidden mt-4">
                            <label class="font-medium text-slate-700">Previously Uploaded Documents</label>
                            <div class="file-list mt-2 border border-gray-200 rounded-md p-2 max-h-40 overflow-y-auto bg-gray-50 space-y-1"></div>
                        </div>
                        
                        <div class="flex items-center my-4">
                            <div class="flex-grow border-t border-gray-300"></div>
                            <span class="flex-shrink-0 mx-4 text-gray-500 font-medium">OR / AND</span>
                            <div class="flex-grow border-t border-gray-300"></div>
                        </div>

                        <div class="form-group">
                            <label for="brownfield_files">Upload Documents</label>
                            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md hover:border-indigo-500 transition-colors cursor-pointer" onclick="document.getElementById('brownfield_files').click()">
                                <div class="space-y-1 text-center">
                                    <i data-lucide="upload-cloud" class="mx-auto h-12 w-12 text-gray-400"></i>
                                    <div class="flex text-sm text-gray-600">
                                        <label for="brownfield_files" class="relative cursor-pointer bg-white rounded-md font-medium text-indigo-600 hover:text-indigo-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-indigo-500">
                                            <span>Upload files</span>
                                            <input id="brownfield_files" name="brownfield_files" type="file" multiple class="sr-only" onchange="updateFileList(this)">
                                        </label>
                                        <p class="pl-1">or drag and drop</p>
                                    </div>
                                    <p class="text-xs text-gray-500">PDF, DOCX, TXT up to 10MB</p>
                                </div>
                            </div>
                            <div id="file-list" class="mt-4 space-y-2"></div>
                        </div>
                        
                        <div class="mt-6 flex justify-end">
                             <button id="btn-generate-brownfield" onclick="submitBrownfieldData()" class="btn-primary">Generate Brownfield Architecture <i data-lucide="cpu" class="w-4 h-4 inline ml-1"></i></button>
                        </div>
                        
                        <div id="step2-result-area" style="display: none; margin-top: 2rem; border-top: 1px solid #e5e7eb; padding-top: 2rem;">
                            <h3 class="text-lg font-semibold text-slate-800 mb-2">AI Suggested Brownfield Architecture</h3>
                             <div class="form-group">
                                <label for="brownfield_suggestion">Review and Copy Code</label>
                                <div class="code-editor-container relative">
                                    <div id="brownfield_suggestion" class="code-editor-content" contenteditable="true"></div>
                                    <button onclick="copyContent('brownfield_suggestion', this)" class="absolute top-2 right-2 p-2 bg-slate-800 text-white rounded-md shadow-md hover:bg-slate-700 opacity-80 hover:opacity-100 transition-opacity" title="Copy Code">
                                        <i data-lucide="copy" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            3: {
                title: "Problem Statement",
                description: "Define the core problem. A good problem statement focuses on the 'what' and 'why', not the 'how'. You can describe it below or upload relevant documents.",
                content: `
                    <div id="step3-content">
                        <div class="form-group">
                            <label for="problem_text">Problem Description</label>
                            <div class="relative">
                                <textarea id="problem_text" rows="6" placeholder="Describe the problem, pain points, and why a new system is needed...">\${wizardData.problemText || ''}</textarea>
                                <button onclick="copyContent('problem_text', this)" class="absolute top-2 right-2 p-1 bg-white rounded-md shadow-sm hover:bg-gray-100 text-gray-500" title="Copy to clipboard">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>

                        <div id="existing-files-container-step3" class="form-group hidden mt-4">
                            <label class="font-medium text-slate-700">Previously Uploaded Documents</label>
                            <div class="file-list mt-2 border border-gray-200 rounded-md p-2 max-h-40 overflow-y-auto bg-gray-50 space-y-1"></div>
                        </div>
                        
                        <div class="flex items-center my-4">
                            <div class="flex-grow border-t border-gray-300"></div>
                            <span class="flex-shrink-0 mx-4 text-gray-500 font-medium">OR / AND</span>
                            <div class="flex-grow border-t border-gray-300"></div>
                        </div>

                        <div class="form-group">
                            <label for="problem_files">Upload Documents</label>
                            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md hover:border-indigo-500 transition-colors cursor-pointer" onclick="document.getElementById('problem_files').click()">
                                <div class="space-y-1 text-center">
                                    <i data-lucide="upload-cloud" class="mx-auto h-12 w-12 text-gray-400"></i>
                                    <div class="flex text-sm text-gray-600">
                                        <label for="problem_files" class="relative cursor-pointer bg-white rounded-md font-medium text-indigo-600 hover:text-indigo-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-indigo-500">
                                            <span>Upload files</span>
                                            <input id="problem_files" name="problem_files" type="file" multiple class="sr-only" onchange="updateProblemFileList(this)">
                                        </label>
                                        <p class="pl-1">or drag and drop</p>
                                    </div>
                                    <p class="text-xs text-gray-500">PDF, DOCX, TXT up to 10MB</p>
                                </div>
                            </div>
                            <div id="problem-file-list" class="mt-4 space-y-2"></div>
                        </div>
                        
                        <div class="mt-6 flex justify-end">
                             <button id="btn-generate-problem" onclick="submitProblemData()" class="btn-primary">Generate Problem Statement <i data-lucide="cpu" class="w-4 h-4 inline ml-1"></i></button>
                        </div>

                        <div id="step3-result-area" style="display: none; margin-top: 2rem; border-top: 1px solid #e5e7eb; padding-top: 2rem;">                            
                            <h3 class="text-lg font-semibold text-slate-800 mb-2">AI Suggested Problem Statement</h3>
                             
                             <!-- Visual + Text Block -->
                             <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                 <!-- Visualization Column -->
                                 <div id="problem-image-container" class="hidden text-center p-4 bg-slate-50 rounded-lg border border-slate-200">
                                    <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">Problem Visualization</h4>
                                    <div class="relative flex items-center justify-center min-h-[400px]">
                                        <img id="problem-image" src="" alt="Problem Visualization" class="max-h-[40rem] w-full object-contain rounded shadow-md hidden">
                                        <div id="problem-image-loading" class="flex flex-col items-center justify-center space-y-2 text-indigo-600">
                                             <i data-lucide="loader-2" class="w-8 h-8 animate-spin"></i>
                                             <span class="font-medium">Generating visualization...</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Text Column (Problem Statement Description) -->
                                <div id="problem-text-column" class="hidden p-4 bg-white rounded-lg border border-gray-200 shadow-sm overflow-y-auto max-h-[400px]">
                                    <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Problem Statement</h4>
                                    <p id="problem-text-output" class="text-gray-700 whitespace-pre-wrap leading-relaxed"></p>
                                </div>
                            </div>
                            
                            <!-- SysML Code Block - Moved below -->
                            <div class="form-group border-t border-gray-100 pt-6">
                                <label for="problem_suggestion">Review and Copy SysML Code</label>
                                <div class="code-editor-container relative">
                                    <div id="problem_suggestion" class="code-editor-content" contenteditable="true"></div>
                                    <button onclick="copyContent('problem_suggestion', this)" class="absolute top-2 right-2 p-2 bg-slate-800 text-white rounded-md shadow-md hover:bg-slate-700 opacity-80 hover:opacity-100 transition-opacity" title="Copy Code">
                                        <i data-lucide="copy" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            4: {
                title: "Stakeholder Needs",
                description: "Who are the key stakeholders and what do they really need from this system?",
                content: `
                    <div id="step4-content">
                        <div class="form-group">
                            <label for="stakeholder_text">Stakeholder Description</label>
                            <div class="relative">
                                <textarea id="stakeholder_text" rows="6" placeholder="Describe the stakeholders and their needs...">\${wizardData.stakeholderText || ''}</textarea>
                                <button onclick="copyContent('stakeholder_text', this)" class="absolute top-2 right-2 p-1 bg-white rounded-md shadow-sm hover:bg-gray-100 text-gray-500" title="Copy to clipboard">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>

                        <div id="existing-files-container-step4" class="form-group hidden mt-4">
                            <label class="font-medium text-slate-700">Previously Uploaded Documents</label>
                            <div class="file-list mt-2 border border-gray-200 rounded-md p-2 max-h-40 overflow-y-auto bg-gray-50 space-y-1"></div>
                        </div>

                        <div class="flex items-center my-4">
                            <div class="flex-grow border-t border-gray-300"></div>
                            <span class="flex-shrink-0 mx-4 text-gray-500 font-medium">OR / AND</span>
                            <div class="flex-grow border-t border-gray-300"></div>
                        </div>

                        <div class="form-group">
                            <label for="stakeholder_files">Upload Documents</label>
                            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md hover:border-indigo-500 transition-colors cursor-pointer" onclick="document.getElementById('stakeholder_files').click()">
                                <div class="space-y-1 text-center">
                                    <i data-lucide="upload-cloud" class="mx-auto h-12 w-12 text-gray-400"></i>
                                    <div class="flex text-sm text-gray-600">
                                        <label for="stakeholder_files" class="relative cursor-pointer bg-white rounded-md font-medium text-indigo-600 hover:text-indigo-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-indigo-500">
                                            <span>Upload files</span>
                                            <input id="stakeholder_files" name="stakeholder_files" type="file" multiple class="sr-only" onchange="updateStakeholderFileList(this)">
                                        </label>
                                        <p class="pl-1">or drag and drop</p>
                                    </div>
                                    <p class="text-xs text-gray-500">PDF, DOCX, TXT up to 10MB</p>
                                </div>
                            </div>
                            <div id="stakeholder-file-list" class="mt-4 space-y-2"></div>
                        </div>
                        
                        <div class="mt-6 flex justify-end">
                             <button id="btn-generate-stakeholder" onclick="submitStakeholderData()" class="btn-primary">Generate Stakeholder Needs <i data-lucide="cpu" class="w-4 h-4 inline ml-1"></i></button>

        function renderStep(stepId) {
            const container = document.getElementById('step-content');
            const data = steps[stepId];

            if (!data) return;

            // Simple templating for Step 1 & 2
            let contentHtml = data.content;
            if (stepId === 1) {
                contentHtml = contentHtml.replace('\${wizardData.systemName}', wizardData.systemName || '')
                    .replace('\${wizardData.systemDescription}', wizardData.systemDescription || '');
            } else if (stepId === 2) {
                contentHtml = contentHtml.replace('\${wizardData.brownfieldText || \'\'}', wizardData.brownfieldText || '');
            } else if (stepId === 3) {
                contentHtml = contentHtml.replace('\${wizardData.problemText || \'\'}', wizardData.problemText || '');
            } else if (stepId === 4) {
                contentHtml = contentHtml.replace('\${wizardData.stakeholderText || \'\'}', wizardData.stakeholderText || '');
            } else if (stepId === 5) {
                contentHtml = contentHtml.replace('\${wizardData.systemIdeaText || \'\'}', wizardData.systemIdeaText || '');
            } else if (stepId === 6) {
                contentHtml = contentHtml.replace('\${wizardData.systemReqText || \'\'}', wizardData.systemReqText || '');
            } else if (stepId === 7) {
                contentHtml = contentHtml.replace('\${wizardData.useCasesText || \'\'}', wizardData.useCasesText || '');
            } else if (stepId === 8) {
                contentHtml = contentHtml.replace('\${wizardData.productArchText || \'\'}', wizardData.productArchText || '');
            }

            container.innerHTML = `
                <div class="animate-fadeIn">
                    <h2>${data.title}</h2>
                    <p class="description">${data.description}</p>
                    ${contentHtml}
                    
                    <div class="mt-8 pt-6 border-t border-gray-200 flex justify-end" id="step-actions">
                       <!-- Actions will be injected based on step state -->
                       ${stepId === 1 ?
                    `<button onclick="validateAndNext(1)" class="btn-primary" id="btn-next-step" disabled style="opacity: 0.5; cursor: not-allowed;">Next Step <i data-lucide="arrow-right" class="w-4 h-4 inline ml-1"></i></button>` :
                    ''
                }

                       ${stepId > 1 && stepId < totalSteps ?
                    `<button onclick="goToStep(${stepId - 1})" class="btn-secondary">Back</button>
                            <button onclick="validateAndNext(${stepId})" class="btn-primary">Next Step <i data-lucide="arrow-right" class="w-4 h-4 inline ml-1"></i></button>` : ''
                }
                       
                       ${stepId === totalSteps ?
                    `<button onclick="goToStep(${stepId - 1})" class="btn-secondary">Back</button>
                            <button onclick="finishWizard()" class="btn-primary" style="background: #10b981;">Finish & Create <i data-lucide="check" class="w-4 h-4 inline ml-1"></i></button>` : ''
                }
                    </div>
                </div>
            `;

            // Post-render logic
            if (stepId === 1) {
                // If code is already generated, show it
                if (wizardData.sysmlCode) {
                    document.getElementById('step1-code-area').style.display = 'block';
                    const editor = document.getElementById('sysml_code_editor');
                    // Pass the raw code directly to avoid innerText normalization issues
                    highlightSysML(editor, wizardData.sysmlCode);

                    const nextBtn = document.getElementById('btn-next-step');
                    if (nextBtn) {
                        nextBtn.disabled = false;
                        nextBtn.style.opacity = '1';
                        nextBtn.style.cursor = 'pointer';
                    }
                }
            }

            lucide.createIcons();
            updateSidebar(stepId);

            // Load existing files if applicable
            if (stepId === 2) {
                loadExistingFiles('existing-files-container-step2');
            } else if (stepId === 3) {
                loadExistingFiles('existing-files-container-step3');
            } else if (stepId === 4) {
                loadExistingFiles('existing-files-container-step4');
            } else if (stepId === 5) {
                loadExistingFiles('existing-files-container-step5');
            } else if (stepId === 6) {
                loadExistingFiles('existing-files-container-step6');
            } else if (stepId === 7) {
                loadExistingFiles('existing-files-container-step7');
            } else if (stepId === 8) {
                loadExistingFiles('existing-files-container-step8');
            }
        }



        async function generateInitialCode() {
            const name = document.getElementById('system_name').value;
            const desc = document.getElementById('system_description').value;

            if (!name) {
                alert("Please enter a System Name.");
                return;
            }

            // Save state
            wizardData.systemName = name;
            wizardData.systemDescription = desc;

            // Call API
            try {
                const response = await fetch('/api/wizard/project-setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, description: desc })
                });

                if (response.ok) {
                    const result = await response.json();
                    wizardData.sysmlCode = result.code;

                    // Update UI
                    const codeArea = document.getElementById('step1-code-area');
                    const editor = document.getElementById('sysml_code_editor');

                    // Pass raw code from result directly
                    highlightSysML(editor, result.code);

                    codeArea.style.display = 'block';

                    // Enable Next Button
                    const nextBtn = document.getElementById('btn-next-step');
                    if (nextBtn) {
                        nextBtn.disabled = false;
                        nextBtn.style.opacity = '1';
                        nextBtn.style.cursor = 'pointer';
                    }

                    // Scroll to bottom
                    codeArea.scrollIntoView({ behavior: 'smooth' });

                } else {
                    alert("Failed to generate code.");
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        async function submitBrownfieldData() {
            const btn = document.getElementById('btn-generate-brownfield');
            const originalText = btn.innerHTML;

            // Set Loading State
            btn.innerHTML = `Generating... <i data-lucide="loader-2" class="w-4 h-4 inline ml-1 animate-spin"></i>`;
            btn.disabled = true;
            btn.style.opacity = '0.7';
            btn.style.cursor = 'wait';
            lucide.createIcons();

            const brownfieldText = document.getElementById('brownfield_text').value;
            const fileInput = document.getElementById('brownfield_files');

            // Save state (text only, files are ephemeral/uploaded)
            wizardData.brownfieldText = brownfieldText;

            const formData = new FormData();
            formData.append('description', brownfieldText);

            for (const file of fileInput.files) {
                formData.append('files', file);
            }

            // Append checked existing files
            appendExistingFiles(formData, 'existing-files-container-step2');

            // Also send system name for context if needed
            formData.append('systemName', wizardData.systemName || '');

            // Send the current SysML code for context
            formData.append('sysmlCode', wizardData.sysmlCode || '');

            try {
                const response = await fetch('/api/wizard/brownfield', {
                    method: 'POST',
                    body: formData // Fetch handles Content-Type for FormData
                });

                if (response.ok) {

        function validateAndNext(currentStepId) {
            let editorId = null;
            let resultAreaId = null;

            switch (currentStepId) {
                case 1:
                    editorId = 'sysml_code_editor';
                    resultAreaId = 'step1-code-area';
                    break;
                case 2:
                    editorId = 'brownfield_suggestion';
                    resultAreaId = 'step2-result-area';
                    break;
                case 3:
                    editorId = 'problem_suggestion';
                    resultAreaId = 'step3-result-area';
                    break;
                case 4:
                    editorId = 'stakeholder_suggestion';
                    resultAreaId = 'step4-result-area';
                    break;
                case 5:
                    editorId = 'system_idea_suggestion';
                    resultAreaId = 'step5-result-area';
                    break;
                case 6:
                    editorId = 'system_req_suggestion';
                    resultAreaId = 'step6-result-area';
                    break;
                case 7:
                    editorId = 'use_cases_suggestion';
                    resultAreaId = 'step7-result-area';
                    break;
                case 8:
                    editorId = 'product_arch_suggestion';
                    resultAreaId = 'step8-result-area';
                    break;
            }

            if (editorId && resultAreaId) {
                const resultArea = document.getElementById(resultAreaId);
                const editor = document.getElementById(editorId);

                // Only update if the result area is visible and editor has content
                // Note: We check offsetParent !== null to determine visibility (display: none has no offsetParent)
                if (resultArea && resultArea.style.display !== 'none' && editor && editor.innerText.trim().length > 0) {
                    // For contenteditable, innerText usually gives the plain text with newlines
                    wizardData.sysmlCode = editor.innerText;
                }
            }

            goToStep(currentStepId + 1);
        }


        function updateSidebar(activeStep) {
            // Reset all
            document.querySelectorAll('.step-item').forEach(el => {
                el.classList.remove('active', 'completed');
            });

            // Set state
            document.querySelectorAll('.step-item').forEach((el, index) => {
                const stepNum = index + 1;
                if (stepNum === activeStep) {
                    el.classList.add('active');
                } else if (stepNum < activeStep) {
                    el.classList.add('completed');
                }
            });
        }

            // If the user types, they might lose formatting or see plain text. 
            // I will add a simple on-blur or "Apply" button or just let it be bold initially.
            // For now, let's keep it simple: Syntax highlight only on generation. 
            // If user edits, it stays plain text or as-is until re-highlighted.

            // To properly support "Make keywords bold" while editing, we'd need a library like Prism or Ace.
            // Given constraints, I will provide a function to re-highlight safely or just on load.
        }

        function highlightSysML(element, codeContent) {
            // Use provided codeContent if available, otherwise fallback to innerText (but innerText might strip newlines)
            let text = codeContent !== undefined ? codeContent : element.innerText;

            if (!text) return;

            // Protect HTML entities
            text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // Replace keywords with bold spans
            // We use word boundary \b to match exact words
            sysmlKeywords.forEach(kw => {
                const regex = new RegExp(`\\b${kw}\\b`, 'g');
                text = text.replace(regex, `<span class="sysml-keyword">${kw}</span>`);
            });

            // Explicitly convert all types of newlines to <br> for HTML rendering.
            text = text.replace(/\r\n|\r|\n/g, "<br>");

            element.innerHTML = text;
        }

        function copyContent(elementId, btn) {
            const element = document.getElementById(elementId);
            if (!element) return;

            let text = "";
            if (element.tagName === 'TEXTAREA' || element.tagName === 'INPUT') {
                text = element.value;
            } else {
                text = element.innerText;
            }

            navigator.clipboard.writeText(text).then(() => {
                // Feedback
                const originalHTML = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-green-500"></i>`;
                lucide.createIcons();
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    lucide.createIcons();
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy', err);
            });
        }


    </script>
</body>
